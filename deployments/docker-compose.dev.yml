services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: development
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - DEBUG=true
    volumes:
      - ../:/app:cached
      - /app/vendor
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      com.job-listing.environment: "development"
      com.job-listing.hot-reload: "enabled"
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      com.job-listing.environment: "development"
  prometheus:
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=7d"
      - "--log.level=debug"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
    labels:
      com.job-listing.environment: "development"
