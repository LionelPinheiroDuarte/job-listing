services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: job-listing-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${APP_ENV:-development}
    volumes:
      - ../data.json:/app/data.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network
      - monitoring-network
  postgres:
    image: postgres:15-alpine
    container_name: job-listing-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-jobdb}
      - POSTGRES_USER=${POSTGRES_USER:-jobuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jobpassword}
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jobuser} -d ${POSTGRES_DB:-jobdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    labels:
      com.job-listing.service: "database"
  prometheus:
    image: prom/prometheus:latest
    container_name: job-listing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=15d"
    user: "nobody"
    restart: unless-stopped
    networks:
      - monitoring-network
    depends_on:
      app:
        condition: service_healthy

networks:
  app-network:
    driver: bridge
    name: job-listing-app
  monitoring-network:
    driver: bridge
    name: job-listing-monitoring

volumes:
  prometheus_data:
    name: job-listing-prometheus-data
  postgres_data:
    name: postgres_data:/var/lib/postgresql/data
