services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: job-listing-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${APP_ENV:-development}
    volumes:
      - ../data.json:/app/data.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-network
      - monitoring-network
    
  prometheus:
    image: prom/prometheus:latest
    container_name: job-listing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=15d"
    user: "nobody"
    restart: unless-stopped
    networks:
      - monitoring-network
    depends_on:
      app:
        condition: service_healthy
    
networks: 
  app-network:
    driver: bridge
    name: job-listing-app
  monitoring-network:
    driver: bridge
    name: job-listing-monitoring

volumes:
  prometheus_data:
    name: job-listing-prometheus-data
